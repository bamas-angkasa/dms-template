services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aice_dms}
      POSTGRES_USER: ${POSTGRES_USER:-dms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 4s
      retries: 10
  api:
    build: ./backend
    environment:
      API_ADDRESS: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/${POSTGRES_DB:-aice_dms}?sslmode=disable
      FRONTEND_URL: http://localhost:3000
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
  web:
    build: .
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
